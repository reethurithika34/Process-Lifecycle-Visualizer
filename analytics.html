<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - OS Process Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .analytics-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
        }
        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        @media (max-width: 900px) {
            .analytics-grid { grid-template-columns: 1fr; }
        }
        .chart-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 30px;
            box-shadow: var(--shadow-card);
            transition: var(--transition);
        }
        .chart-card:hover { border-color: var(--border-glow); }
        .chart-card.full-width {
            grid-column: 1 / -1;
        }
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: var(--bg-surface);
            padding: 24px 30px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-card);
        }
    </style>
</head>
<body>
    <div class="analytics-container">
        <!-- Header -->
        <div class="header-actions">
            <div>
                <h1 class="site-title" style="font-size: 24px;">Simulation Analytics</h1>
                <p class="site-subtitle" style="margin-top: 6px;">Performance graphs and time distributions</p>
            </div>
            <a href="index.html" class="btn btn-clear" style="text-decoration: none;">← Back to Simulator</a>
        </div>

        <!-- No Data State -->
        <div id="noDataMessage" class="empty-state" style="display: none; padding: 60px; background: var(--bg-card); border-radius: var(--radius-lg); border: 1px dashed var(--border);">
            <h3>No simulation data found</h3>
            <p style="margin-top: 10px;">Please run a simulation on the main application to view analytics.</p>
        </div>

        <!-- Dashboard Grid -->
        <div id="dashboard" class="analytics-grid" style="display: none;">
            <div class="chart-card full-width">
                <div class="card-label">Turnaround, Waiting, and Response Times</div>
                <canvas id="barChart" height="90"></canvas>
            </div>
            <div class="chart-card">
                <div class="card-label">CPU Burst Distribution</div>
                <canvas id="pieChart"></canvas>
            </div>
            <div class="chart-card">
                <div class="card-label">Execution Timeline</div>
                <canvas id="lineChart"></canvas>
            </div>
        </div>
    </div>

    <script src="js/webgl-bg.js"></script>
    <script src="js/analytics.js"></script>
</body>
</html>
